services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_CUSTOMER}
      MYSQL_DATABASE_STAFF: ${MYSQL_DATABASE_STAFF}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE_LAPTOP}
      POSTGRES_DATABASE_MOBILE: ${POSTGRES_DATABASE_MOBILE}
      POSTGRES_DATABASE_CLOTHES: ${POSTGRES_DATABASE_CLOTHES}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE_LAPTOP}"]
      interval: 5s
      timeout: 5s
      retries: 20

  customer-service:
    build: ./customer-service
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      laptop-service:
        condition: service_started
      mobile-service:
        condition: service_started
      clothes-service:
        condition: service_started

  staff-service:
    build: ./staff-service
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      laptop-service:
        condition: service_started
      mobile-service:
        condition: service_started
      clothes-service:
        condition: service_started

  laptop-service:
    build: ./laptop-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  mobile-service:
    build: ./mobile-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  clothes-service:
    build: ./clothes-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend-customer:
    build: ./frontend-customer
    env_file: .env
    depends_on:
      - customer-service

  frontend-staff:
    build: ./frontend-staff
    env_file: .env
    depends_on:
      - staff-service

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - customer-service
      - staff-service
      - laptop-service
      - mobile-service
      - clothes-service
      - frontend-customer
      - frontend-staff

volumes:
  mysql_data:
  postgres_data:
